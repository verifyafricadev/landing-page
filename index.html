	<!-- Chunk load failure recovery — if a dynamic import fails (e.g. cached
       HTML references old hashed chunks after a new deploy), reload once to
       fetch fresh assets. Prevents broken pages for returning visitors. -->
	<script>
		(function() {
		  // Build stamp — changes every deploy so stale-cache detection works
		  var BUILD_STAMP = '__READDY_VERSION_ID__';

		  // If the stored stamp doesn't match the current build, clear everything
		  // and reload once. This handles the case where index.html itself is
		  // cached and the recovery script never fires (e.g. no JS errors yet).
		  try {
		    var stored = sessionStorage.getItem('__va_build__');
		    if (stored && stored !== BUILD_STAMP) {
		      sessionStorage.setItem('__va_build__', BUILD_STAMP);
		      if ('caches' in window) {
		        caches.keys().then(function(names) {
		          return Promise.all(names.map(function(n) { return caches.delete(n); }));
		        }).finally(function() { window.location.reload(); });
		      } else {
		        window.location.reload();
		      }
		      return; // stop — page is reloading
		    }
		    sessionStorage.setItem('__va_build__', BUILD_STAMP);
		  } catch(e) { /* sessionStorage blocked — ignore */ }

		  var reloaded = sessionStorage.getItem('__va_reloaded__') === '1';

		  function doReload() {
		    if (reloaded) return; // never loop
		    reloaded = true;
		    try { sessionStorage.setItem('__va_reloaded__', '1'); } catch(e) {}
		    if ('caches' in window) {
		      caches.keys().then(function(names) {
		        return Promise.all(names.map(function(n) { return caches.delete(n); }));
		      }).finally(function() { window.location.reload(); });
		    } else {
		      window.location.reload();
		    }
		  }

		  // Clear the reload flag on successful navigation so future deploys
		  // can trigger a reload again
		  window.addEventListener('load', function() {
		    try { sessionStorage.removeItem('__va_reloaded__'); } catch(e) {}
		  });

		  window.addEventListener('error', function(e) {
		    var msg = e.message || '';
		    var target = e.target;
		    var src = e.filename || (target && (target.src || target.href)) || '';
		    var isChunkError =
		      msg.includes('Loading chunk') ||
		      msg.includes('Loading CSS chunk') ||
		      msg.includes('Failed to fetch dynamically imported module') ||
		      // Script/link 404 — the element src/href contains a hashed asset path
		      (src && src.includes('/assets/') && (e.target instanceof HTMLScriptElement || e.target instanceof HTMLLinkElement));
		    if (isChunkError) doReload();
		  }, true); // capture phase catches resource errors too

		  window.addEventListener('unhandledrejection', function(e) {
		    var msg = e.reason && (e.reason.message || String(e.reason));
		    var isChunkError = msg && (
		      msg.includes('Failed to fetch dynamically imported module') ||
		      msg.includes('error loading dynamically imported module')
		    );
		    if (isChunkError) doReload();
		  });
		})();
	</script>
